name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ─── Build Windows ────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt --ignore-requires-python
          pip install pywin32 pyautogui pillow

      - name: Build con PyInstaller
        shell: pwsh
        run: |
          pyinstaller nova.spec --noconfirm

      - name: Crear Nova-Windows.zip (portable)
        shell: pwsh
        run: |
          Compress-Archive -Path dist/Nova -DestinationPath Nova-Windows.zip

      - name: Crear Nova-Setup.exe (instalador standalone)
        shell: pwsh
        run: |
          pyinstaller main.py `
            --onefile `
            --name Nova-Setup `
            --icon assets/nova.ico `
            --add-data "src/nova;nova" `
            --add-data "assets;assets" `
            --add-data ".env.example;." `
            --hidden-import nova.cli.repl `
            --hidden-import nova.core.nova_router `
            --hidden-import nova.tools.nova_skills `
            --hidden-import nova.lang.novaesp `
            --hidden-import speech_recognition `
            --hidden-import edge_tts `
            --hidden-import groq `
            --hidden-import openai `
            --hidden-import dotenv `
            --noconfirm

      - name: Upload artifacts Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            Nova-Windows.zip
            dist/Nova-Setup.exe

  # ─── Build macOS ──────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias sistema
        run: |
          brew install portaudio 2>/dev/null || true

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt --ignore-requires-python
          pip install pyautogui pillow

      - name: Build con PyInstaller
        run: |
          pyinstaller nova.spec --noconfirm

      - name: Crear Nova-macOS.zip
        run: |
          cd dist
          zip -r ../Nova-macOS.zip Nova.app

      - name: Upload artifact macOS
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: Nova-macOS.zip

  # ─── Build Linux ──────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias sistema
        run: |
          sudo apt-get update -q
          sudo apt-get install -y portaudio19-dev python3-dev

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt --ignore-requires-python
          pip install pillow

      - name: Build con PyInstaller
        run: |
          pyinstaller nova.spec --noconfirm

      - name: Crear Nova-Linux.tar.gz
        run: |
          tar -czf Nova-Linux.tar.gz -C dist Nova

      - name: Upload artifact Linux
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: Nova-Linux.tar.gz

  # ─── Crear Release con todos los artefactos ───────────────────────────────────
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Descargar artefactos
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Build changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Crear Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Nova ${{ github.ref_name }}"
          body: |
            ## Nova Personal Assistant ${{ github.ref_name }}

            ### Descarga según tu sistema operativo:
            | Sistema | Archivo | Descripción |
            |---------|---------|-------------|
            | Windows | `Nova-Setup.exe` | Ejecutable standalone (recomendado) |
            | Windows | `Nova-Windows.zip` | Versión portable |
            | macOS   | `Nova-macOS.zip`   | Aplicación .app |
            | Linux   | `Nova-Linux.tar.gz` | Binario compilado |

            ### Primera vez (alternativa — instalador Python):
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd NOVA_Personal_Asistente
            python install.py
            ```
            El instalador pide las API keys interactivamente y crea el lanzador en el escritorio.

            ---
            ### Cambios en ${{ github.ref_name }}
            ${{ steps.changelog.outputs.CHANGELOG }}
          files: |
            artifacts/windows-builds/Nova-Windows.zip
            artifacts/windows-builds/Nova-Setup.exe
            artifacts/macos-build/Nova-macOS.zip
            artifacts/linux-build/Nova-Linux.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
