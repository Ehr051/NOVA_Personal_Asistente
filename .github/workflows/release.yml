name: Release Notes

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Este workflow solo actualiza el body del release con el changelog.
# Los binarios (Nova-Setup.exe, Nova-Windows.zip, etc.) los genera build.yml.

jobs:
  update-release-notes:
    runs-on: ubuntu-latest
    # Esperar a que build.yml termine de crear el release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Actualizar notas del release
        uses: softprops/action-gh-release@v2
        with:
          name: "Nova ${{ github.ref_name }}"
          body: |
            ## Nova Personal Assistant ${{ github.ref_name }}

            ### Descarga según tu sistema operativo:
            | Sistema | Archivo | Descripción |
            |---------|---------|-------------|
            | Windows | `Nova-Setup.exe` | **Instalador** — crea acceso directo y comando `nova` |
            | Windows (portable) | `Nova-Windows.zip` | Sin instalación, descomprimí y ejecutá |
            | macOS   | `Nova-macOS.zip`   | Descomprimí y ejecutá |
            | Linux   | `Nova-Linux.tar.gz` | Descomprimí y ejecutá |

            ### Instalación desde código fuente:
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd NOVA_Personal_Asistente
            python install.py
            ```
            El instalador pide las API keys interactivamente y crea el lanzador en el escritorio.

            ---
            ### Cambios en ${{ github.ref_name }}
            ${{ steps.changelog.outputs.CHANGELOG }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
