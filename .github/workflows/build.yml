name: Build Installers

on:
  push:
    tags:
      - "v*"          # Se activa solo al pushear un tag: git tag v3.1 && git push --tags
  workflow_dispatch:  # También se puede lanzar manualmente desde GitHub

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: Nova-Windows.exe
            pyinstaller_extra: ""
          - os: macos-latest
            artifact: Nova-macOS.zip
            pyinstaller_extra: ""
          - os: ubuntu-latest
            artifact: Nova-Linux.tar.gz
            pyinstaller_extra: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── Dependencias del sistema (Linux) ──────────────────────────────────
      - name: System deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            portaudio19-dev \
            libsndfile1 \
            espeak-ng \
            mpg123 \
            xvfb \
            libgl1

      # ── Dependencias Python ───────────────────────────────────────────────
      - name: Install base dependencies
        run: pip install --upgrade pip pyinstaller

      - name: Install Nova dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          pip install openai edge-tts SpeechRecognition python-dotenv duckduckgo-search pyautogui Pillow requests numpy groq anthropic qdrant-client mem0ai
          pip install sounddevice pywin32 pycaw comtypes pyperclip PyQt5
          pip install pyinstaller

      - name: Install Nova dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          pip install openai edge-tts SpeechRecognition python-dotenv duckduckgo-search pyautogui Pillow requests numpy groq anthropic qdrant-client mem0ai
          pip install PyAudio PyQt5 gtts rumps
          pip install pyinstaller

      - name: Install Nova dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          pip install openai edge-tts SpeechRecognition python-dotenv duckduckgo-search pyautogui Pillow requests numpy groq anthropic qdrant-client mem0ai
          pip install PyAudio PyQt5 pyperclip pygame
          pip install pyinstaller

      # ── Build PyInstaller ─────────────────────────────────────────────────
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller nova.spec --noconfirm

      - name: Build (macOS/Linux)
        if: runner.os != 'Windows'
        run: pyinstaller nova.spec --noconfirm

      # ── Empaquetar artefactos ─────────────────────────────────────────────
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Compress-Archive -Path dist/Nova/* -DestinationPath Nova-Windows.zip
          # Renombrar exe principal para descarga directa
          Copy-Item dist/Nova/Nova.exe Nova-Windows.exe -ErrorAction SilentlyContinue

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r ../Nova-macOS.zip Nova.app 2>/dev/null || zip -r ../Nova-macOS.zip Nova/
          cd ..

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf Nova-Linux.tar.gz -C dist Nova/

      # ── Subir artefactos al workflow (para descargar desde Actions) ───────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            Nova-Windows.zip
            Nova-Windows.exe
            Nova-macOS.zip
            Nova-Linux.tar.gz
          if-no-files-found: ignore
          retention-days: 30

  # ── Crear Release automático cuando se pushea un tag v* ─────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Nova ${{ github.ref_name }}"
          body: |
            ## Nova Personal Assistant ${{ github.ref_name }}

            ### Descarga según tu sistema operativo:
            | Sistema | Archivo |
            |---------|---------|
            | Windows | `Nova-Windows.zip` |
            | macOS   | `Nova-macOS.zip`   |
            | Linux   | `Nova-Linux.tar.gz` |

            ### Primera vez:
            1. Descomprimí el archivo
            2. Ejecutá `Nova.exe` (Windows) o `Nova` (macOS/Linux)
            3. En la primera ejecución te va a pedir tus API keys
          files: artifacts/**/*
          draft: false
          prerelease: false
