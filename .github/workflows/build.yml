name: Build Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: Nova-Windows.zip
          - os: macos-latest
            artifact: Nova-macOS.zip
          - os: ubuntu-latest
            artifact: Nova-Linux.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── Dependencias del sistema ──────────────────────────────────────────
      - name: System deps (macOS) — portaudio para PyAudio
        if: runner.os == 'macOS'
        run: brew install portaudio

      - name: System deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            portaudio19-dev libsndfile1 espeak-ng mpg123 xvfb libgl1

      # ── Actualizar pip (forma correcta por plataforma) ────────────────────
      - name: Upgrade pip (Windows)
        if: runner.os == 'Windows'
        run: python -m pip install --upgrade pip

      - name: Upgrade pip (macOS/Linux)
        if: runner.os != 'Windows'
        run: python -m pip install --upgrade pip

      # ── Dependencias Python ───────────────────────────────────────────────
      - name: Install base deps
        run: |
          python -m pip install openai edge-tts SpeechRecognition python-dotenv duckduckgo-search pyautogui Pillow requests numpy groq anthropic qdrant-client mem0ai PyQt5

      - name: Install platform deps (Windows)
        if: runner.os == 'Windows'
        run: python -m pip install sounddevice pywin32 pycaw comtypes pyperclip

      - name: Install platform deps (macOS)
        if: runner.os == 'macOS'
        run: python -m pip install PyAudio gtts rumps

      - name: Install platform deps (Linux)
        if: runner.os == 'Linux'
        run: python -m pip install PyAudio pyperclip pygame

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build with PyInstaller
        run: pyinstaller nova.spec --noconfirm

      # ── Installer Windows con Inno Setup ─────────────────────────────────
      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          # Inno Setup ya viene en el runner — buscar ISCC.exe
          $iscc = Get-ChildItem "C:\Program Files (x86)\Inno Setup*\ISCC.exe" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          if (-not $iscc) {
            choco install innosetup --yes --no-progress --ignore-package-exit-codes
            $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          }
          Write-Host "Usando ISCC: $iscc"
          New-Item -ItemType Directory -Force -Path installer\installer_output
          $version = "${{ github.ref_name }}".TrimStart('v')
          & $iscc installer\nova_setup.iss /DAppVersion=$version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Copy-Item installer\installer_output\Nova-Setup.exe Nova-Setup.exe

      # ── Empaquetar ────────────────────────────────────────────────────────
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: Compress-Archive -Path dist\Nova\* -DestinationPath Nova-Windows.zip

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r ../Nova-macOS.zip Nova.app 2>/dev/null || zip -r ../Nova-macOS.zip Nova/

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf Nova-Linux.tar.gz -C dist Nova/

      # ── Subir artefacto ───────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            Nova-Setup.exe
            Nova-Windows.zip
            Nova-macOS.zip
            Nova-Linux.tar.gz
          if-no-files-found: ignore
          retention-days: 30

  # ── Release automático en tags v* ────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Nova ${{ github.ref_name }}"
          body: |
            ## Nova Personal Assistant ${{ github.ref_name }}

            ### Descarga según tu sistema operativo:
            | Sistema | Archivo | Descripción |
            |---------|---------|-------------|
            | Windows | `Nova-Setup.exe` | **Instalador** — crea acceso directo y comando `nova` |
            | Windows (portable) | `Nova-Windows.zip` | Sin instalación, descomprimí y ejecutá |
            | macOS   | `Nova-macOS.zip`   | Descomprimí y ejecutá |
            | Linux   | `Nova-Linux.tar.gz` | Descomprimí y ejecutá |

            ### Primera vez (Windows):
            1. Descargá `Nova-Setup.exe`
            2. Ejecutalo y seguí el asistente
            3. Nova se instala, crea acceso directo en el escritorio y agrega `nova` al PATH
            4. En la primera ejecución te va a pedir tus API keys
          files: artifacts/**/*
          draft: false
          prerelease: false
